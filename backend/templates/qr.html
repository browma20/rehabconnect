{% extends "base.html" %}
{% block title %}Patient QR Code - RehabConnect{% endblock %}
{% block content %}

<h2 style="color: var(--navy); margin-bottom: 1.5rem; text-align: center;">Patient Schedule QR Code</h2>

<p style="text-align: center; margin-bottom: 2rem; color: #666;">
    Scan this QR code to access the patient's therapy schedule
</p>

<div class="qr-container">
    <img src="/qr_image/{{ patient_id }}" alt="Patient Schedule QR Code" />
</div>

<div style="text-align: center; margin-top: 2rem;">
    <a class="btn" href="{{ url_for('patient', patient_id=patient_id) }}">View Schedule</a>
</div>

{% endblock %}
