<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RehabConnect{% endblock %}</title>
    <style>
        :root {
            --navy: #1F4E79;
            --teal: #2BA6A6;
            --soft-gray: #F5F7FA;
            --white: #FFFFFF;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--soft-gray) 0%, var(--white) 100%);
            color: #333;
            min-height: 100vh;
            line-height: 1.6;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: var(--navy);
            color: var(--white);
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px var(--shadow);
            z-index: 1000;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--shadow);
            padding: 2rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            display: inline-block;
            background: var(--navy);
            color: var(--white);
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn:hover {
            background: var(--teal);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(43, 166, 166, 0.3);
        }

        .btn-secondary {
            background: var(--teal);
        }

        .btn-secondary:hover {
            background: #238f8f;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--navy);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(43, 166, 166, 0.1);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: var(--soft-gray);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .schedule-item strong {
            color: var(--navy);
            margin-right: 1rem;
            min-width: 120px;
        }

        .qr-container {
            text-align: center;
        }

        .qr-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem;
                margin: 1rem;
            }

            .container {
                margin: 1rem auto;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>RehabConnect</h1>
    </nav>

    <div class="container">
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
